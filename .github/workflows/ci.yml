name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint client
        run: npm --prefix client run lint

      - name: Typecheck server
        run: cd server && ./node_modules/.bin/tsc --noEmit

      - name: Build
        run: npm run build
